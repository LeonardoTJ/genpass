magi:
  enabled: true
  nodes:
    melchior: true
    balthasar: true
    casper: true
  blockOn:        [UNANIMOUS_BLOCK, MELCHIOR_OVERRIDE]
  warnOn:         [MAJORITY_BLOCK, UNANIMOUS_WARN]
  humanReviewOn:  [DISPUTED]
  ignorePaths:    ["*.md", "vendor/**", "*.lock"]
  lorebookOverrides:
    melchior:  ""    # optional per-node lorebook override
    balthasar: ""
    casper:    ""

  # --- Provider routing (optional) ---------------------------------
  # Per-provider connection settings. Anything omitted falls back to
  # env vars; see the provider table below.
  providers:
    ollama:
      baseUrl: http://localhost:11434      # or set OLLAMA_HOST


  # Default model for any node that doesn't have an explicit override.
  # If omitted entirely, falls back to anthropic + claude-sonnet-4-6.
  defaultModel:
    provider: ollama
    model:    qwen3-coder:480b-cloud
  nodeModels:
    melchior:  { provider: ollama, model: qwen3-coder:480b-cloud, maxTokens: 4000 }
    balthasar: { provider: ollama, model: qwen3.5:cloud }
    casper:    { provider: ollama, model: qwen3.5:cloud }

